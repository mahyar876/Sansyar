<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>سانس‌یار | گالری زمین‌ها</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --bg:           #07100d;
      --bg-card:      #0d1f17;
      --bg-nav:       rgba(7,16,13,0.93);
      --bg-section:   #0b1a13;
      --green:        #22c55e;
      --green-dim:    #16a34a;
      --green-glow:   rgba(34,197,94,0.13);
      --green-border: rgba(34,197,94,0.18);
      --text:         #f0faf4;
      --text-body:    #7fa98c;
      --text-muted:   #3d6650;
      --radius:       12px;
    }

    html { scroll-behavior:smooth; }

    body {
      direction:rtl;
      background:var(--bg);
      color:var(--text);
      font-family:'Vazirmatn',sans-serif;
      line-height:1.7;
      -webkit-font-smoothing:antialiased;
    }

    /* ── NAVBAR ── */
    .header {
      position:sticky; top:0; z-index:200;
      display:flex; justify-content:space-between; align-items:center;
      padding:0 80px; height:68px;
      background:var(--bg-nav);
      backdrop-filter:blur(14px);
      border-bottom:1px solid var(--green-border);
    }
    .logo a {
      text-decoration:none; font-size:22px; font-weight:900;
      color:var(--text); display:flex; align-items:center; gap:9px;
      transition:color .2s;
    }
    .logo-dot {
      width:9px; height:9px; border-radius:50%;
      background:var(--green); box-shadow:0 0 10px var(--green);
    }
    .logo a:hover { color:var(--green); }
    .nav { display:flex; gap:36px; list-style:none; }
    .nav a {
      text-decoration:none; color:var(--text-body); font-size:15px;
      font-weight:500; position:relative; transition:color .2s;
    }
    .nav a::after {
      content:''; position:absolute; bottom:-4px; right:0;
      width:0; height:2px; background:var(--green); transition:width .25s;
    }
    .nav a:hover { color:var(--text); }
    .nav a:hover::after { width:100%; }
    .nav a.active { color:var(--green); }
    .nav a.active::after { width:100%; }
    .btn {
      display:inline-block; background:var(--green); color:#04100a;
      padding:11px 26px; border-radius:var(--radius); text-decoration:none;
      font-weight:700; font-size:15px; font-family:'Vazirmatn',sans-serif;
      transition:background .2s, box-shadow .2s, transform .15s;
      box-shadow:0 0 22px rgba(34,197,94,.28); border:none; cursor:pointer;
    }
    .btn:hover {
      background:var(--green-dim);
      box-shadow:0 0 36px rgba(34,197,94,.45);
      transform:translateY(-2px);
    }

    /* ── PAGE HERO ── */
    .page-hero {
      padding:56px 80px 44px;
      background:var(--bg-section);
      border-bottom:1px solid var(--green-border);
      position:relative; overflow:hidden;
    }
    .page-hero::before {
      content:''; position:absolute; inset:0;
      background-image:
        linear-gradient(rgba(34,197,94,.025) 1px,transparent 1px),
        linear-gradient(90deg,rgba(34,197,94,.025) 1px,transparent 1px);
      background-size:50px 50px;
      pointer-events:none;
    }
    .hero-inner { position:relative; }
    .sec-eyebrow {
      display:inline-flex; align-items:center; gap:8px;
      font-size:11px; font-weight:700; color:var(--green);
      letter-spacing:2px; text-transform:uppercase;
      padding:5px 14px; background:var(--green-glow);
      border:1px solid var(--green-border); border-radius:30px;
      margin-bottom:16px;
    }
    .sec-eyebrow span {
      width:6px; height:6px; border-radius:50%;
      background:var(--green); animation:pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100%{opacity:1;transform:scale(1)}
      50%{opacity:.5;transform:scale(1.4)}
    }
    .page-hero h1 {
      font-size:40px; font-weight:900; margin-bottom:10px;
    }
    .page-hero h1 em { font-style:normal; color:var(--green); }
    .page-hero p { color:var(--text-body); font-size:15px; }

    /* ── FILTER BAR ── */
    .filter-wrap {
      padding:22px 80px;
      background:var(--bg);
      border-bottom:1px solid var(--green-border);
      display:flex; align-items:center; gap:12px; flex-wrap:wrap;
    }
    .filter-label {
      font-size:12px; font-weight:700; color:var(--text-muted);
      letter-spacing:.5px; white-space:nowrap;
    }
    .filter-chips { display:flex; gap:8px; flex-wrap:wrap; }
    .chip {
      padding:7px 18px; border-radius:30px;
      border:1px solid var(--green-border);
      background:transparent; color:var(--text-body);
      font-family:'Vazirmatn',sans-serif; font-size:13px;
      font-weight:600; cursor:pointer;
      transition:all .2s;
    }
    .chip:hover { border-color:var(--green); color:var(--text); }
    .chip.active {
      background:var(--green); color:#04100a;
      border-color:var(--green);
      box-shadow:0 0 14px rgba(34,197,94,.3);
    }
    .filter-sep { width:1px; height:28px; background:var(--green-border); margin:0 6px; }
    .sort-select {
      padding:7px 14px; border-radius:8px;
      background:#0a1a10; border:1px solid var(--green-border);
      color:var(--text); font-family:'Vazirmatn',sans-serif;
      font-size:13px; outline:none; cursor:pointer;
      transition:border-color .2s;
    }
    .sort-select:focus { border-color:var(--green); }

    /* ── STATS BAR ── */
    .stats-bar {
      padding:0 80px 18px;
      display:flex; align-items:center; gap:6px;
      font-size:13px; color:var(--text-muted);
    }
    .stats-bar strong { color:var(--green); font-weight:700; }

    /* ── GALLERY GRID ── */
    .gallery-wrap { padding:0 80px 80px; }

    .gallery-grid {
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:20px;
    }

    /* Featured card spans 2 cols */
    .gallery-card { position:relative; cursor:pointer; border-radius:16px; overflow:hidden; }
    .gallery-card.featured { grid-column:span 2; }

    .card-img {
      width:100%; aspect-ratio:16/9;
      display:flex; align-items:center; justify-content:center;
      position:relative; overflow:hidden;
      transition:transform .4s ease;
    }
    .gallery-card.featured .card-img { aspect-ratio:2/1; }

    .gallery-card:hover .card-img { transform:scale(1.04); }

    /* SVG pitch illustration inside card */
    .pitch-svg {
      width:100%; height:100%; position:absolute; inset:0;
    }

    /* Overlay gradient */
    .card-overlay {
      position:absolute; inset:0;
      background:linear-gradient(to top, rgba(4,12,8,.92) 0%, rgba(4,12,8,.3) 50%, transparent 100%);
      transition:opacity .3s;
    }
    .gallery-card:hover .card-overlay { opacity:.85; }

    /* Hover reveal */
    .card-hover-reveal {
      position:absolute; inset:0;
      display:flex; align-items:center; justify-content:center;
      opacity:0; transition:opacity .25s;
    }
    .gallery-card:hover .card-hover-reveal { opacity:1; }
    .reveal-btn {
      padding:10px 24px; border-radius:10px;
      background:var(--green); color:#04100a;
      font-family:'Vazirmatn',sans-serif; font-weight:700; font-size:14px;
      border:none; cursor:pointer;
      box-shadow:0 0 20px rgba(34,197,94,.5);
      transform:translateY(8px); transition:transform .25s;
    }
    .gallery-card:hover .reveal-btn { transform:translateY(0); }

    .card-body {
      position:absolute; bottom:0; right:0; left:0;
      padding:16px 18px;
    }

    .card-type-badge {
      display:inline-block; margin-bottom:6px;
      font-size:10px; font-weight:700;
      padding:3px 9px; border-radius:20px;
      background:rgba(34,197,94,.18); color:var(--green);
      border:1px solid rgba(34,197,94,.3);
      letter-spacing:.5px;
    }
    .card-title {
      font-size:17px; font-weight:800; margin-bottom:4px;
      text-shadow:0 1px 6px rgba(0,0,0,.6);
    }
    .gallery-card.featured .card-title { font-size:22px; }

    .card-meta {
      display:flex; align-items:center; gap:10px;
      font-size:12px; color:var(--text-body);
    }
    .card-meta-item { display:flex; align-items:center; gap:4px; }
    .card-price { color:var(--green); font-weight:700; font-size:14px; }

    .card-tags {
      display:flex; gap:6px; flex-wrap:wrap; margin-top:6px;
    }
    .tag {
      font-size:10px; padding:2px 8px; border-radius:20px;
      background:rgba(255,255,255,.07); color:var(--text-body);
      border:1px solid rgba(255,255,255,.08);
    }

    /* Border glow on hover */
    .gallery-card::after {
      content:''; position:absolute; inset:0;
      border-radius:16px;
      border:1.5px solid transparent;
      transition:border-color .3s;
      pointer-events:none;
    }
    .gallery-card:hover::after { border-color:rgba(34,197,94,.4); }

    /* avail dot */
    .avail-dot {
      width:7px; height:7px; border-radius:50%;
      background:var(--green);
      box-shadow:0 0 6px var(--green);
      display:inline-block;
    }

    /* ── LIGHTBOX ── */
    .lightbox-overlay {
      position:fixed; inset:0; z-index:900;
      background:rgba(0,0,0,.88);
      backdrop-filter:blur(8px);
      display:none; align-items:center; justify-content:center;
      padding:20px;
    }
    .lightbox-overlay.open { display:flex; }

    .lightbox {
      background:var(--bg-card);
      border:1px solid var(--green-border);
      border-radius:20px;
      width:100%; max-width:860px;
      overflow:hidden;
      animation:lbIn .3s ease;
      position:relative;
    }
    @keyframes lbIn {
      from{opacity:0;transform:scale(.94)}
      to{opacity:1;transform:scale(1)}
    }

    .lb-close {
      position:absolute; top:16px; left:18px; z-index:10;
      background:rgba(0,0,0,.5); border:1px solid var(--green-border);
      color:var(--text-muted); font-size:20px; cursor:pointer;
      width:36px; height:36px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      transition:color .2s, background .2s;
    }
    .lb-close:hover { color:var(--text); background:rgba(34,197,94,.1); }

    .lb-nav {
      position:absolute; top:50%; transform:translateY(-50%);
      z-index:10; background:rgba(0,0,0,.5);
      border:1px solid var(--green-border);
      color:var(--text); font-size:20px; cursor:pointer;
      width:40px; height:40px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      transition:background .2s;
    }
    .lb-nav:hover { background:rgba(34,197,94,.15); }
    .lb-prev { right:14px; }
    .lb-next { left:14px; }

    .lb-img-wrap {
      height:300px; position:relative;
      display:flex; align-items:center; justify-content:center;
      overflow:hidden;
    }

    .lb-pitch-svg { width:100%; height:100%; }

    .lb-img-overlay {
      position:absolute; inset:0;
      background:linear-gradient(to top,rgba(13,31,23,1) 0%,transparent 60%);
    }

    .lb-body { padding:28px 32px 32px; }

    .lb-badge {
      display:inline-block; margin-bottom:10px;
      font-size:11px; font-weight:700;
      padding:4px 12px; border-radius:20px;
      background:var(--green-glow); color:var(--green);
      border:1px solid var(--green-border);
    }

    .lb-title { font-size:26px; font-weight:900; margin-bottom:14px; }

    .lb-info-grid {
      display:grid; grid-template-columns:repeat(3,1fr); gap:12px;
      margin-bottom:20px;
    }

    .lb-info-item {
      background:#0a1a10; border:1px solid var(--green-border);
      border-radius:10px; padding:12px 14px;
    }
    .lb-info-label { font-size:11px; color:var(--text-muted); margin-bottom:4px; }
    .lb-info-value { font-size:15px; font-weight:700; color:var(--text); }
    .lb-info-value.green { color:var(--green); }

    .lb-tags { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:22px; }
    .lb-tag {
      font-size:12px; padding:4px 12px; border-radius:20px;
      background:var(--green-glow); border:1px solid var(--green-border);
      color:var(--text-body);
    }

    .lb-actions { display:flex; gap:12px; }
    .lb-reserve-btn {
      flex:1; padding:14px;
      background:var(--green); color:#04100a;
      border:none; border-radius:10px;
      font-family:'Vazirmatn',sans-serif;
      font-size:16px; font-weight:700; cursor:pointer;
      transition:background .2s, box-shadow .2s;
      box-shadow:0 0 20px rgba(34,197,94,.25);
    }
    .lb-reserve-btn:hover {
      background:var(--green-dim);
      box-shadow:0 0 32px rgba(34,197,94,.4);
    }
    .lb-share-btn {
      padding:14px 20px;
      background:transparent; color:var(--text-body);
      border:1px solid var(--green-border); border-radius:10px;
      font-family:'Vazirmatn',sans-serif; font-size:14px;
      font-weight:600; cursor:pointer;
      transition:all .2s;
    }
    .lb-share-btn:hover { color:var(--text); border-color:var(--green); }

    /* ── EMPTY STATE ── */
    .empty-state {
      grid-column:1/-1; text-align:center;
      padding:80px 20px; color:var(--text-muted);
    }
    .empty-state h3 { font-size:20px; margin-bottom:8px; color:var(--text-body); }

    /* ── FOOTER ── */
    footer {
      text-align:center; padding:26px;
      background:var(--bg);
      border-top:1px solid var(--green-border);
      color:var(--text-muted); font-size:13px;
    }
    footer span { color:var(--green); }

    /* ── RESPONSIVE ── */
    @media (max-width:1100px) {
      .header { padding:0 40px; }
      .page-hero { padding:44px 40px 32px; }
      .filter-wrap { padding:18px 40px; }
      .stats-bar { padding:0 40px 14px; }
      .gallery-wrap { padding:0 40px 60px; }
      .gallery-grid { grid-template-columns:repeat(2,1fr); }
      .gallery-card.featured { grid-column:span 2; }
    }

    @media (max-width:768px) {
      .header { flex-direction:column; height:auto; padding:18px 20px; gap:14px; }
      .nav { flex-wrap:wrap; justify-content:center; gap:12px 20px; }
      .page-hero { padding:32px 20px 24px; }
      .page-hero h1 { font-size:28px; }
      .filter-wrap { padding:16px 20px; }
      .stats-bar { padding:0 20px 12px; }
      .gallery-wrap { padding:0 20px 50px; }
      .gallery-grid { grid-template-columns:1fr; }
      .gallery-card.featured { grid-column:span 1; }
      .lb-info-grid { grid-template-columns:1fr 1fr; }
      .lb-body { padding:20px; }
    }
  </style>
</head>

  <!-- NAVBAR -->

  <!-- GALLERY -->

  </div>

  <!-- LIGHTBOX -->
  <div class="lightbox-overlay" id="lightbox">
    <div class="lightbox">
      <button class="lb-close" onclick="closeLightbox()">✕</button>
      <button class="lb-nav lb-prev" onclick="navLightbox(-1)">›</button>
      <button class="lb-nav lb-next" onclick="navLightbox(1)">‹</button>

      <div class="lb-img-wrap" id="lbImg"></div>

      <div class="lb-body">
        <div class="lb-badge" id="lbBadge"></div>
        <div class="lb-title" id="lbTitle"></div>
        <div class="lb-info-grid" id="lbInfoGrid"></div>
        <div class="lb-tags" id="lbTags"></div>
        <div class="lb-actions">
          <button class="lb-reserve-btn" id="lbReserveBtn">رزرو این زمین ←</button>
          <button class="lb-share-btn" onclick="sharePitch()">اشتراک‌گذاری</button>
        </div>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <p>© ۱۴۰۴ تمامی حقوق متعلق به <span>سانس‌یار</span> است.</p>
  </footer>

  },
];

const typeLabel = { futsal:'فوتسال', grass:'چمن' };

function numFa(n) {
  return n.toString().replace(/\d/g, d=>'۰۱۲۳۴۵۶۷۸۹'[d]);
}
function priceFa(n) {
  return numFa(n.toLocaleString('en'));
}

/* ── PITCH SVG ILLUSTRATION ── */
function pitchSVG(p, large=false) {
  const isFutsal = p.type==='futsal';
  if (isFutsal) {
    return `<svg class="pitch-svg" viewBox="0 0 400 220" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
      <defs>
        <linearGradient id="g${p.id}" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="${p.color1}"/>
          <stop offset="100%" stop-color="${p.color2}"/>
        </linearGradient>
        <radialGradient id="glow${p.id}" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="rgba(34,197,94,0.07)"/>
          <stop offset="100%" stop-color="transparent"/>
        </radialGradient>
      </defs>
      <rect width="400" height="220" fill="url(#g${p.id})"/>
      <rect width="400" height="220" fill="url(#glow${p.id})"/>
      <!-- outer lines -->
      <rect x="16" y="14" width="368" height="192" rx="3" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
      <!-- center line -->
      <line x1="200" y1="14" x2="200" y2="206" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
      <!-- center circle -->
      <circle cx="200" cy="110" r="42" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
      <circle cx="200" cy="110" r="4" fill="rgba(255,255,255,0.2)"/>
      <!-- penalty area left -->
      <rect x="16" y="62" width="60" height="96" fill="none" stroke="rgba(255,255,255,0.09)" stroke-width="1.2"/>
      <rect x="16" y="80" width="28" height="60" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
      <!-- penalty area right -->
      <rect x="324" y="62" width="60" height="96" fill="none" stroke="rgba(255,255,255,0.09)" stroke-width="1.2"/>
      <rect x="356" y="80" width="28" height="60" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
      <!-- corner arcs -->
      <path d="M16,14 Q28,14 28,26" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
      <path d="M384,14 Q372,14 372,26" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
      <path d="M16,206 Q28,206 28,194" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
      <path d="M384,206 Q372,206 372,194" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    </svg>`;
  } else {
    return `<svg class="pitch-svg" viewBox="0 0 400 220" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
      <defs>
        <linearGradient id="g${p.id}" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="${p.color1}"/>
          <stop offset="100%" stop-color="${p.color2}"/>
        </linearGradient>
        <radialGradient id="glow${p.id}" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="rgba(34,197,94,0.06)"/>
          <stop offset="100%" stop-color="transparent"/>
        </radialGradient>
      </defs>
      <rect width="400" height="220" fill="url(#g${p.id})"/>
      <!-- grass stripes -->
      ${[0,1,2,3,4,5,6,7].map(i=>`<rect x="0" y="${i*28}" width="400" height="14" fill="rgba(34,197,94,0.018)"/>`).join('')}
      <rect width="400" height="220" fill="url(#glow${p.id})"/>
      <rect x="16" y="14" width="368" height="192" fill="none" stroke="rgba(255,255,255,0.13)" stroke-width="1.5"/>
      <line x1="200" y1="14" x2="200" y2="206" stroke="rgba(255,255,255,0.13)" stroke-width="1.5"/>
      <circle cx="200" cy="110" r="48" fill="none" stroke="rgba(255,255,255,0.11)" stroke-width="1.5"/>
      <circle cx="200" cy="110" r="4" fill="rgba(255,255,255,0.2)"/>
      <!-- penalty area -->
      <rect x="16" y="54" width="80" height="112" fill="none" stroke="rgba(255,255,255,0.09)" stroke-width="1.2"/>
      <rect x="16" y="74" width="38" height="72" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
      <rect x="304" y="54" width="80" height="112" fill="none" stroke="rgba(255,255,255,0.09)" stroke-width="1.2"/>
      <rect x="346" y="74" width="38" height="72" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
      <!-- penalty arcs -->
      <path d="M96,86 Q120,110 96,134" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
      <path d="M304,86 Q280,110 304,134" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
      <!-- corner arcs -->
      <path d="M16,14 Q30,14 30,28" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
      <path d="M384,14 Q370,14 370,28" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
      <path d="M16,206 Q30,206 30,192" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
      <path d="M384,206 Q370,206 370,192" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    </svg>`;
  }
}

/* ── STATE ── */
let currentFilter = 'all';
let currentSort   = 'default';
let lightboxIndex = 0;
let displayList   = [];

/* ── RENDER ── */
function getFiltered() {
  let list = pitches.filter(p => currentFilter==='all' || p.type===currentFilter);
  if (currentSort==='price-asc')  list = [...list].sort((a,b)=>a.price-b.price);
  if (currentSort==='price-desc') list = [...list].sort((a,b)=>b.price-a.price);
  if (currentSort==='avail')      list = [...list].sort((a,b)=>b.avail-a.avail);
  return list;
}

function render() {
  displayList = getFiltered();
  const grid = document.getElementById('galleryGrid');
  document.getElementById('countDisplay').textContent = numFa(displayList.length);

  if (!displayList.length) {
    grid.innerHTML = `<div class="empty-state"><h3>هیچ زمینی پیدا نشد</h3><p>فیلتر دیگری امتحان کن</p></div>`;
    return;
  }

  grid.innerHTML = displayList.map((p, idx) => `
    <div class="gallery-card ${idx===0 && currentFilter==='all' && currentSort==='default' ? 'featured' : ''}"
         onclick="openLightbox(${p.id})">
      <div class="card-img">
        ${pitchSVG(p)}
        <div class="card-overlay"></div>
        <div class="card-hover-reveal">
          <button class="reveal-btn">مشاهده جزئیات</button>
        </div>
        <div class="card-body">
          <div class="card-type-badge">${typeLabel[p.type]} · ${numFa(p.size)} نفره</div>
          <div class="card-title">${p.name}</div>
          <div class="card-meta">
            <span class="card-meta-item"><span class="avail-dot"></span> ${numFa(p.avail)} سانس خالی</span>
            <span class="card-price">${priceFa(p.price)} تومان</span>
          </div>
          <div class="card-tags">${p.tags.slice(0,3).map(t=>`<span class="tag">${t}</span>`).join('')}</div>
        </div>
      </div>
    </div>
  `).join('');
}

/* ── LIGHTBOX ── */
function openLightbox(id) {
  lightboxIndex = displayList.findIndex(p=>p.id===id);
  renderLightbox();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow='hidden';
}

function renderLightbox() {
  const p = displayList[lightboxIndex];
  if (!p) return;

  document.getElementById('lbImg').innerHTML = pitchSVG(p, true) +
    '<div class="lb-img-overlay"></div>';

  document.getElementById('lbBadge').textContent = typeLabel[p.type] + ' · ' + numFa(p.size) + ' نفره';
  document.getElementById('lbTitle').textContent = p.name;

  document.getElementById('lbInfoGrid').innerHTML = `
    <div class="lb-info-item">
      <div class="lb-info-label">قیمت هر ساعت</div>
      <div class="lb-info-value green">${priceFa(p.price)} تومان</div>
    </div>
    <div class="lb-info-item">
      <div class="lb-info-label">سانس‌های خالی</div>
      <div class="lb-info-value green">${numFa(p.avail)} سانس</div>
    </div>
    <div class="lb-info-item">
      <div class="lb-info-label">آدرس</div>
      <div class="lb-info-value" style="font-size:12px;line-height:1.5">${p.address}</div>
    </div>
  `;

  document.getElementById('lbTags').innerHTML = p.tags.map(t=>`<span class="lb-tag">${t}</span>`).join('');

  document.getElementById('lbReserveBtn').onclick = () => {
    window.location.href = `./reserve.html?pitch=${p.id}`;
  };
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow='';
}

function navLightbox(dir) {
  lightboxIndex = (lightboxIndex + dir + displayList.length) % displayList.length;
  renderLightbox();
}

function sharePitch() {
  const p = displayList[lightboxIndex];
  if (navigator.share) {
    navigator.share({ title: p.name, text: `رزرو ${p.name} در سانس‌یار`, url: window.location.href });
  } else {
    navigator.clipboard.writeText(window.location.href).then(()=> alert('لینک کپی شد!'));
  }
}

/* ── EVENTS ── */
document.querySelectorAll('.chip').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.chip').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render();
  });
});

document.getElementById('sortSelect').addEventListener('change', e => {
  currentSort = e.target.value;
  render();
});

document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target.id==='lightbox') closeLightbox();
});

document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key==='Escape') closeLightbox();
  if (e.key==='ArrowRight') navLightbox(-1);
  if (e.key==='ArrowLeft')  navLightbox(1);
});

/* ── INIT ── */
render();
</script>
</body>
</html>
